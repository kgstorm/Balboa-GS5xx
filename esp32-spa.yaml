substitutions:
  version: "1.1" 

esphome:
  name: balboa-gs5xx
  friendly_name: balboa-gs5xx
  project:
    name: "kgstorm.balboa-gs5xx"
    version: ${version}

esp32:
  board: esp32dev
  framework:
    type: esp-idf

# Enable Home Assistant API
api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password
  - platform: http_request
    id: ota_http

wifi:
  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Esp32-Spa Fallback Hotspot"
    password: !secret ap_password

captive_portal:

logger:

http_request:
  useragent: esphome/balboa-gs5xx
  timeout: 20s
  buffer_size_rx: 2048
  buffer_size_tx: 1024
  redirect_limit: 5

update:
  - platform: http_request
    name: "Firmware Update"
    source: https://kgstorm.github.io/Balboa-GS5xx/firmware/manifest.json
    update_interval: 6h

globals:
  - id: display_is_fahrenheit
    type: bool
    restore_value: true
    initial_value: 'false'

external_components:
  - source: esp32-spa
  
text_sensor:
  - platform: inputs
    parent_id: display_handler
    type: error_code
    name: "Spa Error Code"
  - platform: inputs
    parent_id: display_handler
    type: spa_mode
    name: "Spa Mode"

# ===== HOT TUB DISPLAY INPUTS =====
sensor:
  - platform: inputs
    id: display_handler
    measured_temp:
      name: "Spa Measured Temp"
      id: spa_measured_temp
      unit_of_measurement: "°C"
      accuracy_decimals: 1
      device_class: temperature
      filters:
        - lambda: |-
            if (id(display_is_fahrenheit)) return (x - 32.0f) * 5.0f / 9.0f;
            return x;
    set_temp:
      name: "Spa Set Temp"
      id: spa_set_temp
      unit_of_measurement: "°C"
      accuracy_decimals: 1
      device_class: temperature
      filters:
        - lambda: |-
            if (id(display_is_fahrenheit)) return (x - 32.0f) * 5.0f / 9.0f;
            return x;

binary_sensor:
  - platform: inputs
    parent_id: display_handler
    type: heater
    name: "Spa Heater Status"
  - platform: inputs
    parent_id: display_handler
    type: pump
    name: "Spa Pump Status"
  - platform: inputs
    parent_id: display_handler
    type: light
    name: "Spa Light Status"

select:
  - platform: template
    name: "Spa Display Unit"
    id: spa_display_unit
    icon: "mdi:thermometer"
    options:
      - "°C"
      - "°F"
    initial_option: "°C"
    restore_value: true
    optimistic: true
    on_value:
      - globals.set:
          id: display_is_fahrenheit
          value: !lambda 'return x == "°F";'

# ===== BUTTONS (GPIO outputs) =====
output:
  - platform: gpio
    id: spa_lights_out
    pin: 25
    inverted: false
  - platform: gpio
    id: spa_temp_out
    pin: 26
    inverted: false
  - platform: gpio
    id: spa_jets_out
    pin: 27
    inverted: false
  - platform: gpio
    id: spa_blower_out
    pin: 32
    inverted: false

button:
  - platform: template
    name: "Spa Temp"
    icon: "mdi:thermometer"
    on_press:
      - logger.log: "Button pressed: TEMP"
      - output.turn_on: spa_temp_out
      - delay: 100ms
      - output.turn_off: spa_temp_out

  - platform: template
    name: "Spa Lights"
    icon: "mdi:lightbulb"
    on_press:
      - logger.log: "Button pressed: LIGHTS"
      - output.turn_on: spa_lights_out
      - delay: 100ms
      - output.turn_off: spa_lights_out

  - platform: template
    name: "Spa Jets"
    icon: "mdi:fan"
    on_press:
      - logger.log: "Button pressed: JETS"
      - output.turn_on: spa_jets_out
      - delay: 100ms
      - output.turn_off: spa_jets_out

  - platform: template
    name: "Spa Blower"
    icon: "mdi:weather-windy"
    on_press:
      - logger.log: "Button pressed: BLOWER"
      - output.turn_on: spa_blower_out
      - delay: 100ms
      - output.turn_off: spa_blower_out