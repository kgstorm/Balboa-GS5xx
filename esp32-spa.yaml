substitutions:
  version: "2.0" 

esphome:
  name: esp32-spa
  friendly_name: esp32-spa
  project:
    name: "kgstorm.esp32-spa"
    version: ${version}

esp32:
  board: esp32dev
  framework:
    type: esp-idf

# Enable Home Assistant API
api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password
  - platform: http_request
    id: ota_http

wifi:
  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Esp32-Spa Fallback Hotspot"
    password: !secret ap_password

captive_portal:

logger:

http_request:
  useragent: esphome/esp32-spa
  timeout: 20s
  buffer_size_rx: 2048
  buffer_size_tx: 1024
  redirect_limit: 5

update:
  - platform: http_request
    name: "Firmware Update"
    source: https://kgstorm.github.io/Balboa-GS100-with-VL260-topside/firmware/manifest.json
    update_interval: 6h

globals:
  - id: display_is_fahrenheit
    type: bool
    restore_value: true
    initial_value: 'false'

external_components:
  - source: esp32-spa
  
text_sensor:
  - platform: inputs
    parent_id: display_handler
    type: error_code
    name: "Spa Error Code"

# ===== HOT TUB DISPLAY INPUTS =====
sensor:
  - platform: inputs
    id: display_handler
    measured_temp:
      name: "Spa Measured Temp"
      id: spa_measured_temp
      unit_of_measurement: "°C"
      accuracy_decimals: 0
      device_class: temperature
    set_temp:
      name: "Spa Set Temp"
      id: spa_set_temp
      unit_of_measurement: "°C"
      accuracy_decimals: 0
      device_class: temperature

binary_sensor:
  - platform: inputs
    parent_id: display_handler
    type: heater
    name: "Spa Heater Status"
  - platform: inputs
    parent_id: display_handler
    type: pump
    name: "Spa Pump Status"
  - platform: inputs
    parent_id: display_handler
    type: light
    name: "Spa Light Status"

select:
  - platform: template
    name: "Spa Display Unit"
    id: spa_display_unit
    icon: "mdi:thermometer"
    options:
      - "°C"
      - "°F"
    initial_option: "°C"
    restore_value: true
    optimistic: true
    on_value:
      - lambda: |-
          bool is_f = (x == "°F");
          id(spa_measured_temp).set_unit_of_measurement(is_f ? "°F" : "°C");
          id(spa_set_temp).set_unit_of_measurement(is_f ? "°F" : "°C");

# ===== BUTTONS (GPIO outputs) =====
output:
  - platform: gpio
    id: spa_warm_out
    pin: 25
    inverted: false
  - platform: gpio
    id: spa_cool_out
    pin: 26
    inverted: false
  - platform: gpio
    id: spa_lights_out
    pin: 27
    inverted: false
  - platform: gpio
    id: spa_pumps_out
    pin: 32
    inverted: false

button:
  - platform: template
    name: "Spa Warm"
    icon: "mdi:thermometer-plus"
    on_press:
      - logger.log: "Button pressed: WARM"
      - output.turn_on: spa_warm_out
      - delay: 100ms
      - output.turn_off: spa_warm_out

  - platform: template
    name: "Spa Cool"
    icon: "mdi:thermometer-minus"
    on_press:
      - logger.log: "Button pressed: COOL"
      - output.turn_on: spa_cool_out
      - delay: 100ms
      - output.turn_off: spa_cool_out

  - platform: template
    name: "Spa Lights"
    icon: "mdi:lightbulb"
    on_press:
      - logger.log: "Button pressed: LIGHTS"
      - output.turn_on: spa_lights_out
      - delay: 100ms
      - output.turn_off: spa_lights_out

  - platform: template
    name: "Spa Pumps"
    icon: "mdi:pump"
    on_press:
      - logger.log: "Button pressed: PUMPS"
      - output.turn_on: spa_pumps_out
      - delay: 100ms
      - output.turn_off: spa_pumps_out